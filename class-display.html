<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生名录系统 - 专业版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; background: #f1f5f9; color: #1e293b; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .student-card { transition: transform 0.2s; will-change: transform; }
        .student-card:hover { transform: translateY(-4px); }
        [v-cloak] { display: none; }
        /* 骨架屏动画 */
        @keyframes shimmer { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .loading-shimmer { animate: shimmer 1.5s infinite; }
    </style>
</head>
<body>

<div id="app" v-cloak class="min-h-screen">
    <!-- 顶部导航 -->
    <nav class="sticky top-0 z-30 glass-panel shadow-sm px-4 py-3">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
            <h1 class="text-xl font-bold text-indigo-600">学生数据管理 ({{ totalCount }})</h1>
            
            <div class="flex flex-wrap gap-2">
                <select v-for="(label, key) in filterLabels" :key="key" v-model="filters[key]" 
                        class="bg-white border border-gray-200 rounded-lg px-2 py-1.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none min-w-[100px]">
                    <option value="">全部{{ label }}</option>
                    <option v-for="opt in getOptions(key)" :value="opt">{{ opt }}</option>
                </select>
                <button @click="resetFilters" class="px-3 py-1.5 text-xs bg-gray-200 hover:bg-gray-300 rounded-lg transition">重置</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <!-- 统计信息 -->
        <div class="mb-6 flex items-center justify-between text-sm text-gray-500">
            <p v-if="!loading">找到 {{ filteredStudents.length }} 条结果</p>
            <p v-else>正在加载海量数据...</p>
        </div>

        <!-- 加载状态 -->
        <div v-if="loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div v-for="i in 8" class="h-32 bg-white rounded-2xl loading-shimmer shadow-sm"></div>
        </div>

        <!-- 学生列表 - 采用分批渲染 -->
        <div v-else class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <div v-for="s in displayedStudents" :key="s.studentId" 
                 class="student-card bg-white rounded-2xl p-5 shadow-sm border border-gray-100 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-start mb-3">
                        <div class="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center font-bold">
                            {{ s.name.charAt(0) }}
                        </div>
                        <span class="text-[10px] text-gray-400 font-mono">{{ s.studentId }}</span>
                    </div>
                    <h3 class="text-lg font-bold mb-1">{{ s.name }}</h3>
                    <div class="space-y-1 text-xs text-gray-500 italic">
                        <p>{{ s.collegeName }}</p>
                        <p>{{ s.majorName }}</p>
                    </div>
                </div>
                <div class="mt-4 pt-3 border-t border-gray-50 flex justify-between items-center">
                    <span class="px-2 py-0.5 bg-blue-50 text-blue-600 rounded text-[10px] font-bold">{{ s.className }}</span>
                    <span class="text-[10px] text-gray-400">{{ s.grade }}级</span>
                </div>
            </div>
        </div>

        <!-- 加载更多提示 (滚动监听) -->
        <div v-if="hasMore" id="load-more-trigger" class="py-10 text-center text-gray-400 text-sm italic">
            正在加载更多...
        </div>
        
        <!-- 空状态 -->
        <div v-if="!loading && filteredStudents.length === 0" class="py-20 text-center">
            <div class="text-4xl mb-2">🍃</div>
            <p class="text-gray-400">没有找到匹配的数据</p>
        </div>
    </main>
</div>

<script>
    const { createApp, ref, computed, onMounted, watch } = Vue;

    createApp({
        setup() {
            const allStudents = ref([]);
            const loading = ref(true);
            const displayLimit = ref(40); // 初始显示40条
            const filters = ref({
                collegeName: '',
                majorName: '',
                className: '',
                grade: ''
            });

            const filterLabels = {
                collegeName: '学院',
                majorName: '专业',
                className: '班级',
                grade: '年级'
            };

            // 获取数据
            onMounted(async () => {
                try {
                    const response = await fetch('./student_info.json');
                    const data = await response.json();
                    // 性能优化：Object.freeze 告诉 Vue 不要递归监听这 10000 个对象
                    allStudents.value = Object.freeze(data);
                } catch (err) {
                    alert('数据加载失败，请检查 student_info.json 是否存在');
                } finally {
                    loading.value = false;
                    setupScrollListener();
                }
            });

            // 提取选项逻辑 (针对大数据优化)
            const getOptions = (type) => {
                let source = allStudents.value;
                if (type === 'majorName' && filters.value.collegeName) {
                    source = source.filter(s => s.collegeName === filters.value.collegeName);
                }
                if (type === 'className' && filters.value.majorName) {
                    source = source.filter(s => s.majorName === filters.value.majorName);
                }
                const set = new Set();
                for(let i=0; i<source.length; i++) {
                    set.add(source[i][type]);
                }
                return Array.from(set).sort();
            };

            // 核心过滤逻辑
            const filteredStudents = computed(() => {
                const f = filters.value;
                // 如果没有任何筛选，直接返回原数据提高速度
                if (!f.collegeName && !f.majorName && !f.className && !f.grade) {
                    return allStudents.value;
                }
                return allStudents.value.filter(s => {
                    return (!f.collegeName || s.collegeName === f.collegeName) &&
                           (!f.majorName || s.majorName === f.majorName) &&
                           (!f.className || s.className === f.className) &&
                           (!f.grade || s.grade === f.grade);
                });
            });

            // 最终渲染到屏幕上的数据（只取一部分）
            const displayedStudents = computed(() => {
                return filteredStudents.value.slice(0, displayLimit.value);
            });

            const hasMore = computed(() => {
                return displayLimit.value < filteredStudents.value.length;
            });

            // 监听滚动实现无限加载
            const setupScrollListener = () => {
                window.addEventListener('scroll', () => {
                    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                        if (hasMore.value) {
                            displayLimit.value += 40; // 每次加载更多40条
                        }
                    }
                });
            };

            // 当筛选条件改变时，重置显示限制
            watch(filters, () => {
                displayLimit.value = 40;
                window.scrollTo(0, 0);
            }, { deep: true });

            const resetFilters = () => {
                filters.value = { collegeName: '', majorName: '', className: '', grade: '' };
            };

            return {
                allStudents,
                loading,
                filters,
                filterLabels,
                getOptions,
                filteredStudents,
                displayedStudents,
                hasMore,
                resetFilters,
                totalCount: computed(() => allStudents.value.length)
            };
        }
    }).mount('#app');
</script>
</body>
</html>
