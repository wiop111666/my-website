    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的成绩单</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #888888;
            --accent-green: #2ecc71;
            --accent-orange: #f39c12;
            --border-radius: 12px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 40px;
        }

        /* 顶部统计区域 */
        .dashboard {
            background: linear-gradient(135deg, var(--primary-color), #6ab0f3);
            color: white;
            padding: 20px;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .dashboard h2 {
            font-size: 18px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            text-align: center;
        }

        .stat-item .value {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .stat-item .label {
            font-size: 11px;
            opacity: 0.9;
        }

        /* 筛选区域 */
        .filters {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            background-color: var(--bg-color);
        }

        .filter-select {
            flex: 1;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background-color: white;
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23333%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 10px top 50%;
            background-size: 10px auto;
        }

        /* 列表区域 */
        .course-list {
            padding: 0 20px;
        }

        .course-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }

        .card-left {
            flex: 1;
        }

        .course-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .course-meta {
            font-size: 12px;
            color: var(--text-sub);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .tag {
            padding: 2px 6px;
            border-radius: 4px;
            background-color: #f0f0f0;
            color: #666;
        }

        .tag.required { background-color: #e3f2fd; color: #1976d2; } /* 必修课颜色 */
        .tag.elective { background-color: #e8f5e9; color: #388e3c; } /* 选修课颜色 */

        .card-right {
            text-align: right;
            min-width: 70px;
        }

        .score {
            font-size: 22px;
            font-weight: bold;
            color: var(--primary-color);
            line-height: 1;
        }

        .gpa-sub {
            font-size: 11px;
            color: var(--text-sub);
            margin-top: 4px;
        }

        .high-score { color: var(--accent-green); }
        
        .empty-state {
            text-align: center;
            padding: 40px 0;
            color: var(--text-sub);
            font-size: 14px;
        }
    </style>
</head>

        // ================= 核心逻辑 =================

        // 1. 初始化年份映射 (将 2025-2026 映射为 大X)
        let uniqueYears = [...new Set(dataList.map(item => item.academic_year))].sort();
        
        // 辅助函数：获取语义化的学期名称
        function getSemesterName(year, sem) {
            const index = uniqueYears.indexOf(year);
            const gradeNames = ['大一', '大二', '大三', '大四']; // 防止延毕
            const grade = gradeNames[index] || year; // 如果超出范围显示原年份
            const semName = sem == '1' ? '上' : (sem == '2' ? '下' : '其他');
            return `${grade}${semName}`;
        }

        // 辅助函数：给数据对象添加语义化时间字段，方便排序和展示
        dataList.forEach(item => {
            item.semesterLabel = getSemesterName(item.academic_year, item.semester);
            // 创建一个用于排序的权重值
            const yearIdx = uniqueYears.indexOf(item.academic_year);
            item.sortWeight = yearIdx * 10 + parseInt(item.semester);
        });

        // 按照时间倒序排列 (最新的在最上面)
        dataList.sort((a, b) => b.sortWeight - a.sortWeight);

        // ================= DOM 元素 =================
        const courseListEl = document.getElementById('course-list');
        const semesterFilterEl = document.getElementById('semester-filter');
        const typeFilterEl = document.getElementById('type-filter');
        const avgGpaEl = document.getElementById('avg-gpa');
        const totalCreditsEl = document.getElementById('total-credits');
        const courseCountEl = document.getElementById('course-count');

        // ================= 渲染筛选选项 =================
        function initFilters() {
            // 学期选项
            const semesters = [...new Set(dataList.map(d => d.semesterLabel))].sort();
            // 注意：这里可能需要自定义排序让 大一上 在前 或 在后，目前是字符排序
            semesters.forEach(sem => {
                const option = document.createElement('option');
                option.value = sem;
                option.textContent = sem;
                semesterFilterEl.appendChild(option);
            });

            // 课程类型选项
            const types = [...new Set(dataList.map(d => d.course_type))];
            types.forEach(type => {
                const option = document.createElement('option');
                option.value = type;
                option.textContent = type;
                typeFilterEl.appendChild(option);
            });
        }

        // ================= 计算统计数据 =================
        function calculateStats(list) {
            if (list.length === 0) {
                avgGpaEl.textContent = "0.00";
                totalCreditsEl.textContent = "0";
                courseCountEl.textContent = "0";
                return;
            }

            let totalCredit = 0;
            let totalCreditGP = 0; // 学分绩点之和 (学分 * 绩点)

            list.forEach(item => {
                const credit = parseFloat(item.credit) || 0;
                // 注意：你的数据源里已经有 credit_grade_point 了，可以直接用
                // 为了保险，也可以重新算： const gp = parseFloat(item.grade_point);
                const creditGP = parseFloat(item.credit_grade_point) || 0;

                totalCredit += credit;
                totalCreditGP += creditGP;
            });

            // 平均学分绩点 = Σ(课程绩点×课程学分) / Σ课程学分
            const avgGpa = totalCredit > 0 ? (totalCreditGP / totalCredit) : 0;

            // 动画效果更新数值
            avgGpaEl.textContent = avgGpa.toFixed(2);
            totalCreditsEl.textContent = totalCredit.toFixed(1).replace(/\.0$/, ''); // 去掉 .0
            courseCountEl.textContent = list.length;
        }

        // ================= 渲染列表 =================
        function renderList(list) {
            courseListEl.innerHTML = '';

            if (list.length === 0) {
                courseListEl.innerHTML = '<div class="empty-state">没有找到相关课程记录</div>';
                return;
            }

            list.forEach(item => {
                const card = document.createElement('div');
                card.className = 'course-card';

                // 根据分数设置颜色 class
                const scoreClass = parseFloat(item.score) >= 90 ? 'high-score' : 'score';
                // 根据类型设置 tag class
                const typeClass = item.course_type.includes('必修') ? 'required' : 
                                  (item.course_type.includes('选修') ? 'elective' : '');

                card.innerHTML = `
                    <div class="card-left">
                        <div class="course-name">${item.course_name}</div>
                        <div class="course-meta">
                            <span class="tag ${typeClass}">${item.course_type}</span>
                            <span>${item.semesterLabel}</span>
                            <span>${item.credit}学分</span>
                        </div>
                    </div>
                    <div class="card-right">
                        <div class="${scoreClass}">${item.score}</div>
                        <div class="gpa-sub">GP: ${item.grade_point}</div>
                    </div>
                `;
                courseListEl.appendChild(card);
            });
        }

        // ================= 主逻辑：筛选与更新 =================
        function updatePage() {
            const semVal = semesterFilterEl.value;
            const typeVal = typeFilterEl.value;

            // 过滤数据
            const filteredData = dataList.filter(item => {
                const matchSem = semVal === 'all' || item.semesterLabel === semVal;
                const matchType = typeVal === 'all' || item.course_type === typeVal;
                return matchSem && matchType;
            });

            // 渲染
            renderList(filteredData);
            calculateStats(filteredData);
            
            // 更新标题
            const titleEl = document.getElementById('dashboard-title');
            if(semVal !== 'all' || typeVal !== 'all') {
                titleEl.textContent = "筛选统计";
            } else {
                titleEl.textContent = "所有课程总览";
            }
        }

        // ================= 事件监听与初始化 =================
        semesterFilterEl.addEventListener('change', updatePage);
        typeFilterEl.addEventListener('change', updatePage);

        // 启动
        initFilters();
        updatePage(); // 初始渲染所有数据

    </script>
