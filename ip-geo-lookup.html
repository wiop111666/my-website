<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP & 地理位置查询 (国内加速版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet 地图 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 400px; border-radius: 1rem; }
        .status-pulse { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #10b981; margin-right: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <div class="max-w-5xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <!-- 顶部 -->
            <div class="bg-slate-800 p-6 text-white">
                <h1 class="text-xl font-bold flex items-center">
                    <span class="status-pulse"></span> IPv4 地理位置精准查询
                </h1>
                <p class="text-slate-400 text-xs mt-1">支持国内网络环境，自动规避 CORS 限制</p>
            </div>

            <div class="p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- 数据栏 -->
                <div class="space-y-6">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-widest">我的公网 IP</label>
                        <p id="ip-addr" class="text-3xl font-black text-blue-600 tracking-tighter italic">正在探测...</p>
                    </div>

                    <div class="bg-blue-50 p-4 rounded-xl space-y-3">
                        <div>
                            <label class="text-xs font-bold text-blue-400 uppercase">地理位置</label>
                            <p id="location" class="font-bold text-blue-900 text-lg">正在解析...</p>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-blue-400 uppercase">运营商 / 网络服务</label>
                            <p id="isp" class="font-medium text-blue-800 truncate text-sm">-</p>
                        </div>
                    </div>

                    <div class="bg-gray-50 p-4 rounded-xl">
                        <label class="text-xs font-bold text-gray-400 uppercase">经纬度坐标</label>
                        <p id="coords" class="font-mono text-gray-600">-</p>
                    </div>

                    <div id="proxy-warning" class="hidden p-4 bg-orange-100 border-l-4 border-orange-500 text-orange-700 text-sm">
                        <p class="font-bold">检测到代理或 VPN</p>
                        <p>如果您在中国但显示为美国，请关闭代理软件后刷新。</p>
                    </div>
                    
                    <button onclick="location.reload()" class="w-full py-3 bg-slate-800 text-white rounded-lg font-bold hover:bg-slate-700 transition">
                        重新检测
                    </button>
                </div>

                <!-- 地图栏 -->
                <div class="lg:col-span-2">
                    <div id="map" class="border border-gray-200"></div>
                </div>
            </div>
        </div>
        
        <p class="text-center mt-6 text-gray-400 text-xs">
            地图源: CartoDB (国内加速) | 数据源: ipapi.co (JSONP)
        </p>
    </div>

    <script>
        // 1. 初始化地图 (使用 CartoDB 瓦片，国内加载飞快)
        const map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '©CartoDB'
        }).addTo(map);
        let marker;

        // 2. JSONP 回调处理函数
        window.handleResponse = function(data) {
            if (data && !data.error) {
                // 更新文字信息
                document.getElementById('ip-addr').innerText = data.ip;
                document.getElementById('location').innerText = `${data.country_name} · ${data.region} · ${data.city}`;
                document.getElementById('isp').innerText = data.org || '未知运营商';
                document.getElementById('coords').innerText = `${data.latitude}, ${data.longitude}`;

                // 代理判定
                if (data.country_code !== 'CN') {
                    document.getElementById('proxy-warning').classList.remove('hidden');
                }

                // 更新地图
                const lat = data.latitude;
                const lon = data.longitude;
                map.setView([lat, lon], 12);
                if (marker) map.removeLayer(marker);
                marker = L.marker([lat, lon]).addTo(map)
                    .bindPopup(`<b>${data.city}</b>`)
                    .openPopup();
            } else {
                document.getElementById('ip-addr').innerText = "解析失败";
            }
        };

        // 3. 使用 JSONP 发起请求 (避开 fetch 和 CORS)
        function callIPAPI() {
            const script = document.createElement('script');
            // 强制使用 IPv4 且返回 JSONP
            script.src = 'https://ipapi.co/jsonp/?callback=handleResponse';
            script.onerror = function() {
                document.getElementById('ip-addr').innerText = "连接 API 超时";
                alert("无法连接到地理位置服务器，请检查你的网络设置或是否开启了过于严格的拦截器。");
            };
            document.body.appendChild(script);
        }

        window.onload = callIPAPI;
    </script>
</body>
</html>
