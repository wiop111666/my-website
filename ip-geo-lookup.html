<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精确 IP 定位 - 保定版测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 450px; border-radius: 1.5rem; z-index: 1; }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-10">
        <header class="flex items-center justify-between mb-10">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">高精度 IP 定位</h1>
                <p class="text-slate-500 font-medium">采用 IP.sb 高精度数据库 · 自动识别城市</p>
            </div>
            <div class="hidden md:block">
                <span id="status-tag" class="px-4 py-2 bg-blue-100 text-blue-700 rounded-full text-sm font-bold">📡 系统准备就绪</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- 左侧面板 -->
            <div class="lg:col-span-4 space-y-6">
                <!-- IP 卡片 -->
                <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-2 block">My Public IPv4</label>
                    <div id="ip-display" class="text-3xl font-mono font-bold text-blue-600 break-all">0.0.0.0</div>
                </div>

                <!-- 详情卡片 -->
                <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 space-y-6">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1 block">地理位置 (省/市)</label>
                        <p id="city-display" class="text-xl font-bold text-slate-800">正在匹配数据库...</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1 block">经度</label>
                            <p id="lon-display" class="text-lg font-mono text-slate-700">-</p>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1 block">纬度</label>
                            <p id="lat-display" class="text-lg font-mono text-slate-700">-</p>
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1 block">运营商服务商</label>
                        <p id="isp-display" class="text-sm font-medium text-slate-600 italic">-</p>
                    </div>
                </div>

                <div id="proxy-hint" class="hidden p-5 bg-indigo-50 rounded-2xl border border-indigo-100 text-indigo-700 text-xs leading-relaxed">
                    <b>💡 提示：</b>如果定位依然有偏差，可能是由于运营商的宽带出口 IP 集中在省会城市造成的。
                </div>
            </div>

            <!-- 地图面板 -->
            <div class="lg:col-span-8">
                <div class="bg-white p-3 rounded-[2.5rem] shadow-2xl border border-slate-100">
                    <div id="map"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. 初始化地图 (采用高德风格的浅色底图，国内访问较快)
        const map = L.map('map', { zoomControl: false }).setView([34, 108], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© IP.sb Data'
        }).addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        let marker;

        async function locateMe() {
            const statusTag = document.getElementById('status-tag');
            try {
                statusTag.innerText = "⏳ 正在连接高精度数据库...";
                
                // 使用 IP.sb 接口，该接口对中国城市识别非常准
                const response = await fetch('https://api.ip.sb/geoip', {
                    headers: { 'Accept': 'application/json' }
                });
                
                if (!response.ok) throw new Error("API 响应错误");
                const data = await response.json();

                // 更新界面
                document.getElementById('ip-display').innerText = data.ip;
                // 拼接位置：如果 city 和 region 一样，就只显示一个
                const locationStr = `${data.country} · ${data.region} · ${data.city}`;
                document.getElementById('city-display').innerText = locationStr;
                document.getElementById('isp-display').innerText = data.isp || data.organization;
                document.getElementById('lon-display').innerText = data.longitude.toFixed(4);
                document.getElementById('lat-display').innerText = data.latitude.toFixed(4);

                statusTag.innerText = "✅ 定位成功";
                statusTag.className = "px-4 py-2 bg-green-100 text-green-700 rounded-full text-sm font-bold";

                // 更新地图
                const lat = data.latitude;
                const lon = data.longitude;
                map.setView([lat, lon], 12);

                if (marker) map.removeLayer(marker);
                marker = L.marker([lat, lon]).addTo(map)
                    .bindPopup(`<div class="font-bold">${data.city}</div><div class="text-xs text-gray-500">${data.isp}</div>`)
                    .openPopup();

                // 如果是中国 IP 以外，显示提示
                if (data.country_code !== 'CN') {
                    document.getElementById('proxy-hint').classList.remove('hidden');
                }

            } catch (error) {
                console.error(error);
                statusTag.innerText = "❌ 接口访问受限";
                statusTag.className = "px-4 py-2 bg-red-100 text-red-700 rounded-full text-sm font-bold";
                document.getElementById('ip-display').innerText = "连接超时";
            }
        }

        window.onload = locateMe;
    </script>
</body>
</html>
