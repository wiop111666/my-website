<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP 地理位置查询</title>
    <!-- Tailwind CSS 为页面美化 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet 地图库 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 400px; border-radius: 12px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">📍 我的 IP 地理位置信息</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="space-y-4">
                <div>
                    <p class="text-sm text-gray-500">当前 IP</p>
                    <p id="ip" class="text-lg font-mono font-bold text-blue-600">正在获取...</p>
                </div>
                <div>
                    <p class="text-sm text-gray-500">国家 / 城市</p>
                    <p id="location" class="text-lg text-gray-800">-</p>
                </div>
                <div>
                    <p class="text-sm text-gray-500">经纬度</p>
                    <p id="coords" class="text-lg text-gray-800">-</p>
                </div>
                <div>
                    <p class="text-sm text-gray-500">运营商</p>
                    <p id="org" class="text-lg text-gray-800">-</p>
                </div>
            </div>
            <div id="map"></div>
        </div>
        
        <div class="text-xs text-gray-400 text-center">
            数据由 ipapi.co 提供 | 地图由 Leaflet/OpenStreetMap 提供
        </div>
    </div>

    <script>
        // 初始化地图
        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        let marker;

        // 获取 IP 信息
        async function fetchIPInfo() {
            try {
                // 使用 ipapi.co (免费且支持 HTTPS)
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                if (data.error) throw new Error(data.reason);

                // 更新 UI
                document.getElementById('ip').innerText = data.ip;
                document.getElementById('location').innerText = `${data.country_name} - ${data.region} - ${data.city}`;
                document.getElementById('coords').innerText = `${data.latitude}, ${data.longitude}`;
                document.getElementById('org').innerText = data.org || '未知';

                // 更新地图
                const lat = data.latitude;
                const lon = data.longitude;
                map.setView([lat, lon], 13);
                if (marker) map.removeLayer(marker);
                marker = L.marker([lat, lon]).addTo(map)
                    .bindPopup(`您的位置: ${data.city}`)
                    .openPopup();

            } catch (error) {
                console.error('获取失败:', error);
                document.getElementById('ip').innerText = '获取失败，请刷新或关闭插件';
            }
        }

        window.onload = fetchIPInfo;
    </script>
</body>
</html>
