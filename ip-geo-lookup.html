<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精确 IP 地理位置查询 - IPv4 版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        #map { height: 350px; border-radius: 12px; z-index: 1; }
        .loading-dot { animation: blink 1.4s infinite both; }
        @keyframes blink { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <div class="max-w-5xl mx-auto px-4 py-12">
        <!-- 头部 -->
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold tracking-tight text-slate-800 mb-2">📍 IP 地理位置查询</h1>
            <p class="text-slate-500">检测您的 IPv4 地址及详细地理位置信息</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 左侧面板：详情 -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">当前网络地址</h2>
                    <div id="ip-display" class="text-2xl font-bold mono text-blue-600 break-all leading-tight">
                        <span class="loading-dot">查询中...</span>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                    <div>
                        <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-1">国家 / 城市</h2>
                        <p id="location-display" class="text-lg font-medium text-slate-800">-</p>
                    </div>
                    <div>
                        <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-1">经纬度坐标</h2>
                        <p id="coords-display" class="text-lg font-medium text-slate-800">-</p>
                    </div>
                    <div>
                        <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-1">运营商 / ISP</h2>
                        <p id="isp-display" class="text-lg font-medium text-slate-800">-</p>
                    </div>
                    <div>
                        <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-1">时区</h2>
                        <p id="tz-display" class="text-lg font-medium text-slate-800">-</p>
                    </div>
                </div>

                <!-- 提示 -->
                <div id="proxy-warning" class="hidden bg-amber-50 border border-amber-200 p-4 rounded-xl text-amber-700 text-sm">
                    ⚠️ <b>检测到位置异常？</b> 如果您在中国但显示为美国，通常是因为您开启了 VPN 或代理工具。请尝试关闭它们并刷新页面。
                </div>
            </div>

            <!-- 右侧面板：地图 -->
            <div class="lg:col-span-2">
                <div class="bg-white p-2 rounded-2xl shadow-sm border border-slate-200">
                    <div id="map"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化地图
        const map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.pdt.xyz/maptiles/osm/{z}/{x}/{y}.png' || 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        let marker;

        async function fetchIPData() {
            try {
                // 第一步：强制获取 IPv4 地址
                // 使用 api4.ipify.org 强制只获取 IPv4
                const ipRes = await fetch('https://api4.ipify.org?format=json');
                const ipData = await ipRes.json();
                const ipv4 = ipData.ip;

                // 第二步：根据获取到的 IPv4 查询地理位置
                // 使用 ipwho.is (对中国 IP 的识别度较高，且支持 HTTPS)
                const geoRes = await fetch(`https://ipwho.is/${ipv4}?lang=zh-CN`);
                const data = await geoRes.json();

                if (!data.success) throw new Error(data.message);

                // 第三步：更新 UI
                document.getElementById('ip-display').innerText = data.ip;
                document.getElementById('location-display').innerText = `${data.country} · ${data.region} · ${data.city}`;
                document.getElementById('coords-display').innerText = `${data.latitude.toFixed(4)}, ${data.longitude.toFixed(4)}`;
                document.getElementById('isp-display').innerText = data.connection.isp;
                document.getElementById('tz-display').innerText = data.timezone.utc + " " + data.timezone.id;

                // 判断是否可能开启了代理
                if (data.country_code !== 'CN') {
                    document.getElementById('proxy-warning').classList.remove('hidden');
                }

                // 第四步：更新地图
                const lat = data.latitude;
                const lon = data.longitude;
                map.setView([lat, lon], 11);
                if (marker) map.removeLayer(marker);
                marker = L.marker([lat, lon]).addTo(map)
                    .bindPopup(`<b>当前位置</b><br>${data.city}`)
                    .openPopup();

            } catch (error) {
                console.error('Fetch Error:', error);
                document.getElementById('ip-display').innerHTML = '<span class="text-red-500 text-base">获取失败，请检查网络连接</span>';
            }
        }

        window.onload = fetchIPData;
    </script>
</body>
</html>
