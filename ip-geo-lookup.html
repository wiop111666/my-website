<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPv4 地址查询工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 380px; border-radius: 1rem; z-index: 1; }
        .info-card { transition: all 0.3s ease; }
        .info-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <div class="max-w-5xl mx-auto px-4 py-10">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-extrabold text-gray-900 sm:text-4xl">📍 我的公网 IP 信息</h1>
            <p class="mt-3 text-gray-600 font-medium">强制 IPv4 检测 · 实时地理位置</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 数据显示栏 -->
            <div class="lg:col-span-1 space-y-4">
                <!-- IP 地址卡片 -->
                <div class="bg-blue-600 p-6 rounded-2xl shadow-lg text-white info-card">
                    <p class="text-blue-100 text-xs uppercase font-bold tracking-wider mb-1">当前 IPv4 地址</p>
                    <p id="ip-val" class="text-2xl font-mono font-bold italic">获取中...</p>
                </div>

                <!-- 详细信息卡片 -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 space-y-5 info-card">
                    <div>
                        <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-1">国家 / 城市</p>
                        <p id="loc-val" class="text-gray-800 font-semibold text-lg">加载中...</p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-1">经纬度坐标</p>
                        <p id="geo-val" class="text-gray-800 font-mono text-base">-</p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-1">运营商信息 (ISP)</p>
                        <p id="isp-val" class="text-gray-800 font-medium text-base">-</p>
                    </div>
                </div>

                <!-- 代理提醒 -->
                <div id="proxy-note" class="hidden bg-orange-50 border border-orange-200 p-4 rounded-xl">
                    <p class="text-orange-700 text-sm italic">
                        <b>提示：</b> 检测到您当前 IP 不在中国。如果您身处国内，请关闭 VPN 或代理插件后刷新页面以获取真实位置。
                    </p>
                </div>
            </div>

            <!-- 地图栏 -->
            <div class="lg:col-span-2">
                <div class="bg-white p-2 rounded-3xl shadow-sm border border-gray-100">
                    <div id="map"></div>
                </div>
            </div>
        </div>

        <footer class="mt-10 text-center text-gray-400 text-xs">
            <p>数据源: api4.ipify.org & freeipapi.com | 仅供参考</p>
        </footer>
    </div>

    <script>
        // 1. 初始化地图 (默认中心点北京)
        const map = L.map('map').setView([39.9, 116.4], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        let marker;

        async function fetchInfo() {
            try {
                // 第一步：获取 IPv4 地址 (使用只支持 IPv4 的解析服务)
                const ipRes = await fetch('https://api4.ipify.org?format=json');
                const { ip } = await ipRes.json();
                document.getElementById('ip-val').innerText = ip;

                // 第二步：获取地理位置 (使用对 CORS 友好的 freeipapi)
                const geoRes = await fetch(`https://freeipapi.com/api/json/${ip}`);
                const data = await geoRes.json();

                // 第三步：填充数据
                // 转换国家代码 (简单演示)
                const country = data.countryName === 'China' ? '中国' : data.countryName;
                document.getElementById('loc-val').innerText = `${country} · ${data.regionName} · ${data.cityName}`;
                document.getElementById('geo-val').innerText = `${data.latitude}, ${data.longitude}`;
                
                // 部分 API 不提供 ISP，这里尝试显示时区或补充信息
                document.getElementById('isp-val').innerText = data.zipCode ? `邮编: ${data.zipCode}` : "暂无运营商数据";

                // 第四步：判断地理位置提醒
                if (data.countryCode !== 'CN') {
                    document.getElementById('proxy-note').classList.remove('hidden');
                }

                // 第五步：更新地图
                const lat = data.latitude;
                const lon = data.longitude;
                map.setView([lat, lon], 12);
                if (marker) map.removeLayer(marker);
                marker = L.marker([lat, lon]).addTo(map)
                    .bindPopup(`您的 IP 位置: ${data.cityName}`)
                    .openPopup();

            } catch (err) {
                console.error("查询失败:", err);
                document.getElementById('ip-val').innerText = "获取失败";
                document.getElementById('loc-val').innerText = "请检查网络或刷新页面";
            }
        }

        window.onload = fetchInfo;
    </script>
</body>
</html>
