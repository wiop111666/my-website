<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>车牌归属地查询</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #7f8c8d;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-weight: 300;
            font-size: 1.5rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            color: var(--primary-color);
        }

        .search-box {
            background: var(--card-bg);
            padding: 8px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            border: none;
            padding: 12px 15px;
            font-size: 16px;
            outline: none;
            border-radius: 10px;
            text-transform: uppercase;
        }

        button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:active {
            transform: scale(0.95);
            background: var(--accent-color);
        }

        #result {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
            min-height: 120px;
        }

        #result.show {
            opacity: 1;
            transform: translateY(0);
        }

        .result-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .province-label {
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 5px;
            display: block;
        }

        .province-name {
            font-size: 24px;
            font-weight: 600;
            display: block;
            margin-bottom: 15px;
        }

        .region-tag {
            display: inline-block;
            background: #ebf5fb;
            color: var(--accent-color);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .error {
            color: #e74c3c;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>车牌查询</h1>
        
        <div class="search-box">
            <input type="text" id="plateInput" placeholder="例如：京A" maxlength="2">
            <button onclick="searchPlate()">查询</button>
        </div>

        <div id="result">
            <!-- 结果将在这里显示 -->
        </div>
    </div>

    <script>
        let plateData = [];

        // 页面加载时获取数据
        fetch('plate_region_data.json')
            .then(response => response.json())
            .then(data => {
                plateData = data;
            })
            .catch(err => console.error("无法加载数据文件", err));

        function searchPlate() {
            const input = document.getElementById('plateInput').value.trim().toUpperCase();
            const resultDiv = document.getElementById('result');
            
            if (!input) return;

            let found = null;
            let provinceName = "";

            // 遍历数据查找
            for (let item of plateData) {
                const match = item.plates.find(p => p.plate === input);
                if (match) {
                    found = match;
                    provinceName = item.province;
                    break;
                }
            }

            // 渲染结果
            resultDiv.classList.remove('show');
            
            setTimeout(() => {
                if (found) {
                    resultDiv.innerHTML = `
                        <div class="result-card">
                            <span class="province-label">所属省份</span>
                            <span class="province-name">${provinceName}</span>
                            <span class="region-tag">${found.region}</span>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `<p class="error">未找到该车牌信息</p>`;
                }
                resultDiv.classList.add('show');
            }, 100);
        }

        // 监听回车键
        document.getElementById('plateInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchPlate();
                this.blur(); // 移动端隐藏键盘
            }
        });
    </script>
</body>
</html>
