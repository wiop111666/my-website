<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保定理工学院-学生信息查询系统</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --hover-color: #45a049;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .search-box {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            gap: 10px;
        }
        input[type="text"] {
            width: 300px;
            padding: 10px 15px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: var(--primary-color);
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: var(--hover-color);
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #status {
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f8f9fa;
            color: #333;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        .no-data {
            text-align: center;
            padding: 20px;
            color: #999;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>保定理工学院-学生信息查询系统</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="请输入学生姓名 (支持模糊搜索)" disabled>
        <button id="searchBtn" onclick="searchStudent()" disabled>搜索</button>
    </div>

    <div id="status">正在加载数据文件，请稍候...</div>

    <div style="overflow-x: auto;">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>学号</th>
                    <th>姓名</th>
                    <th>学院代码</th>
                    <th>学院名称</th>
                    <th>专业代码</th>
                    <th>专业名称</th>
                    <th>班级</th>
                    <th>年级</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>
</div>

<script>
    let allStudentsData = [];

    window.onload = async function() {
        const statusEl = document.getElementById('status');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');

        try {
            const response = await fetch('./student_info.json');
            if (!response.ok) throw new Error("student_info.json 加载失败");
            allStudentsData = await response.json();

            if (allStudentsData.length > 0) {
                statusEl.innerHTML = `数据加载成功！共加载了 <b>${allStudentsData.length}</b> 条学生信息。`;
                statusEl.style.color = "green";
                searchInput.disabled = false;
                searchBtn.disabled = false;
                searchInput.focus();
            } else {
                statusEl.innerHTML = "未找到任何数据，请检查 student_info.json 文件内容。";
                statusEl.style.color = "red";
            }

        } catch (error) {
            statusEl.innerHTML = `数据加载发生错误：${error.message}`;
            statusEl.style.color = "red";
        }
    };

    document.getElementById('searchInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') searchStudent();
    });

    function searchStudent() {
        const keyword = document.getElementById('searchInput').value.trim();
        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';

        if (!keyword) {
            alert("请输入要搜索的姓名！");
            return;
        }

        const matchedStudents = allStudentsData.filter(student =>
            student.name && student.name.includes(keyword)
        );

        if (matchedStudents.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" class="no-data">没有找到包含 "${keyword}" 的学生信息</td></tr>`;
        } else {
            matchedStudents.forEach(student => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${student.studentId || '-'}</td>
                    <td>${student.name || '-'}</td>
                    <td>${student.college || '-'}</td>
                    <td>${student.collegeName || '-'}</td>
                    <td>${student.major || '-'}</td>
                    <td>${student.majorName || '-'}</td>
                    <td>${student.className || '-'}</td>
                    <td>${student.grade || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    }
</script>

</body>
</html>
